<VirtualHost *:80>
    ServerName rpm.local

    DocumentRoot /var/www/rpm/public

    <Directory /var/www/rpm/public>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    # Deny access to app source outside public/
    <Directory /var/www/rpm>
        Require all denied
    </Directory>

    <Directory /var/www/rpm/public>
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/rpm_error.log
    CustomLog ${APACHE_LOG_DIR}/rpm_access.log combined
</VirtualHost>
